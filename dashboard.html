<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Dashboard</title>
    <link rel="stylesheet" href="dashboard.css?v=3">
    <style>body { display: none; }</style>
</head>
<body>
    <main>
        <div class="section-title">
            <h2>Select a Project</h2>
        </div>

        <div class="project-grid" id="project-container">
            <!-- Projects will be generated here by Javascript -->
        </div>
    </main>

    <!-- Modal Form untuk Upload Project -->
    <div id="upload-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add New Project</h3>
                <span class="close-modal" id="close-modal">&times;</span>
            </div>
            <div class="modal-body">
                <form id="upload-form">
                    <div class="form-group">
                        <label for="project-name">Project Name</label>
                        <input type="text" id="project-name" required placeholder="e.g. Engine Block V3">
                    </div>
                    <div class="form-group">
                        <label for="project-file">Upload 3D Model (.glb)</label>
                        <input type="file" id="project-file" accept=".glb" required>
                    </div>
                    <button type="submit" class="submit-btn" id="btn-upload">Create Project</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Tombol Logout Statis di tengah bawah -->
    <a href="logout.php" class="btn-logout-fixed">
        <svg viewBox="0 0 24 24"><path d="M16 17v-3H9v-4h7V7l5 5-5 5M14 2a2 2 0 012 2v2h-2V4H5v16h9v-2h2v2a2 2 0 01-2 2H5a2 2 0 01-2-2V4a2 2 0 012-2h9z"></path></svg>
        LOGOUT
    </a>

    <script src="dashboard.js?v=4"></script>
</body>
</html>
